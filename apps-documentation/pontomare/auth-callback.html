<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Autenticação — Ponto Maré">
  <meta name="robots" content="noindex, nofollow">
  <title>Autenticação — Ponto Maré</title>
  <link rel="stylesheet" href="email_confirmation.css">
</head>
<body>
  <main class="page">
    <div class="page-inner">
      <article class="card">
        <header class="card-header">
          <img
            class="logo"
            src="../../assets/img/ponto-mare-logo.png"
            alt="Ponto Maré"
            width="72"
            height="72"
          >
          <h1 class="brand-title">Ponto Maré</h1>
          <p class="brand-subtitle">Autenticação</p>
        </header>

        <div class="card-body">
          <section aria-live="polite">
            <div class="status-icon status-icon--loading" aria-hidden="true">…</div>
            <h2>Processando autenticação</h2>
            <p class="message">Aguarde enquanto redirecionamos você para a página correta.</p>
            <p class="hint">
              Se nada acontecer, tente abrir o link novamente pelo e-mail ou fale com o
              <a href="mailto:contato.pontomare@gmail.com">suporte</a>.
            </p>
          </section>
        </div>
      </article>

      <p class="footer">© Ponto Maré</p>
    </div>
  </main>

  <script src="auth-callback.js" defer></script>
</body>
</html>
